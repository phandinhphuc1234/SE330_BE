# Prometheus configuration for local library-service monitoring.
#
# Vai trò file này:
# - Khai báo Prometheus sẽ đi lấy metric từ những service nào.
# - Khai báo chu kỳ scrape metric.
# - Gắn label cố định để query/Grafana filter dễ hơn.
#
# Backend Spring Boot hiện chạy bằng service library-service trong cùng
# Docker Compose network với Prometheus. Vì vậy Prometheus gọi backend
# bằng service name: library-service:8080.

global:
  # Chu kỳ mặc định Prometheus gọi các endpoint metric.
  scrape_interval: 15s

  # Chu kỳ mặc định Prometheus evaluate rules/alerts.
  # Hiện project chưa khai báo alert rules, nhưng để sẵn cho cấu hình chuẩn.
  evaluation_interval: 15s

scrape_configs:
  # Job tự monitor chính Prometheus.
  # Hữu ích để kiểm tra Prometheus server còn hoạt động không.
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Job chính của đồ án: scrape metric từ Spring Boot backend.
  - job_name: library-service

    # Endpoint do Spring Boot Actuator + Micrometer Prometheus expose.
    metrics_path: /actuator/prometheus

    # Scrape backend nhanh hơn default để dashboard local phản hồi rõ khi demo.
    scrape_interval: 10s

    static_configs:
      - targets:
          # Prometheus container gọi app Spring Boot trong cùng Compose network.
          - library-service:8080

        # Label cố định được gắn vào mọi metric của target này.
        # Dùng trong PromQL/Grafana, ví dụ: up{job="library-service"}.
        labels:
          application: library-service
          environment: local
