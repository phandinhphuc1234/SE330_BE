spring.application.name=QuanLyThuVien
spring.config.import=optional:file:.env[.properties]

# ======================
# PostgreSQL CONFIG
# ======================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:mydatabase}}
spring.datasource.username=${POSTGRES_USER:myuser}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
# QUAN TRỌNG: để validate thay vì create/update — Flyway quản lý schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ===== Flyway =====
# ============== BA DÒNG SAU BẮT BUỘC PHẢI CÓ ==========================
spring.flyway.enabled=true
# Chỉ định nơi Flyway đi tìm file .sql. classpath:db/migration tương ứng với:
spring.flyway.locations=classpath:db/migration
# Thêm Flyway vào một database đã có sẵn data (không phải database trống), Flyway sẽ từ chối chạy vì nó thấy schema
spring.flyway.baseline-on-migrate=true
#=====================================================
spring.flyway.validate-on-migrate=true
# Quy định Flyway có chấp nhận migration chạy lộn thứ tự không.
spring.flyway.out-of-order=false
# Ngăn bạn sửa file migration đã chạy — vi phạm nguyên tắc quan trọng nhất của Flyway
spring.flyway.schemas=public

#========================
#JWT Token
#========================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000


# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# ======================
# REDIS CONFIG
# ======================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Nếu Redis có password (production)
# spring.data.redis.password=your_redis_password

# Connection pool (Lettuce — default client)
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=2000ms

# ======================
# MAIL / SMTP CONFIG
# ======================
# Gmail SMTP (dùng App Password, không phải mật khẩu Gmail)
# Hướng dẫn tạo App Password: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ======================
# APP CONFIG
# ======================
app.service-name=library-service
# URL gốc để tạo link xác nhận email (không có dấu / ở cuối)
app.verification.base-url=http://localhost:8080

# ======================
# CORS CONFIG
# ======================
# Frontend origins duoc phep goi API. Production nen doi thanh domain frontend that.
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# ======================
# COOKIE CONFIG
# ======================
# Config các thuộc tính cho cookie trên browser
app.cookie.refresh-token-name=refreshToken
app.cookie.refresh-token-path=/api/auth/
# Khi deploy production có HTTPS thì nên để secure = true để cookie chỉ được gửi qua HTTPS
app.cookie.refresh-token-secure=false
app.cookie.refresh-token-same-site=Lax
