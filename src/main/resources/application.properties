spring.application.name=QuanLyThuVien
spring.config.import=optional:file:.env[.properties]

# ======================
# PostgreSQL CONFIG
# ======================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:mydatabase}}
spring.datasource.username=${POSTGRES_USER:myuser}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
# QUAN TRỌNG: để validate thay vì create/update — Flyway quản lý schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ===== Flyway =====
# ============== BA DÒNG SAU BẮT BUỘC PHẢI CÓ ==========================
spring.flyway.enabled=true
# Chỉ định nơi Flyway đi tìm file .sql. classpath:db/migration tương ứng với:
spring.flyway.locations=classpath:db/migration
# Thêm Flyway vào một database đã có sẵn data (không phải database trống), Flyway sẽ từ chối chạy vì nó thấy schema
spring.flyway.baseline-on-migrate=true
#=====================================================
spring.flyway.validate-on-migrate=true
# Quy định Flyway có chấp nhận migration chạy lộn thứ tự không.
spring.flyway.out-of-order=false
# Ngăn bạn sửa file migration đã chạy — vi phạm nguyên tắc quan trọng nhất của Flyway
spring.flyway.schemas=public

#========================
#JWT Token
#========================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000


# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# ======================
# REDIS CONFIG
# ======================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Project chỉ dùng StringRedisTemplate, không dùng Redis Repository.
spring.data.redis.repositories.enabled=false

# Nếu Redis có password (production)
# spring.data.redis.password=your_redis_password

# Connection pool (Lettuce — default client)
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=2000ms

# ======================
# MAIL / SMTP CONFIG
# ======================
# Resend SMTP.
# Official SMTP credentials:
# - Host: smtp.resend.com
# - Username: resend
# - Password: RESEND_API_KEY (starts with re_)
# - Port 465 uses implicit SSL/TLS.
spring.mail.host=smtp.resend.com
spring.mail.port=465
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

# Sender address to use with Resend. Free/sandbox testing commonly uses onboarding@resend.dev.
app.mail.from=${MAIL_FROM:onboarding@resend.dev}

# ======================
# APP CONFIG
# ======================
app.service-name=library-service
# URL gốc để tạo link xác nhận email (không có dấu / ở cuối)
app.verification.base-url=${APP_VERIFICATION_BASE_URL:http://localhost:8080}

# Multipart upload limits. Ebook PDF business validation allows up to 100MB;
# request limit is slightly higher to account for multipart form overhead.
spring.servlet.multipart.max-file-size=${APP_MULTIPART_MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${APP_MULTIPART_MAX_REQUEST_SIZE:110MB}

# ======================
# PAYMENT / VNPAY CONFIG
# ======================
# Sandbox values are loaded from .env in local development.
app.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
app.payment.vnpay.enabled=${VNPAY_ENABLED:true}
app.payment.vnpay.payment-url=${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.payment.vnpay.transaction-url=${VNPAY_TRANSACTION_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
app.payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:3000/payment/vnpay-return}
app.payment.vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/payments/ipn/vnpay}
app.payment.vnpay.version=${VNPAY_VERSION:2.1.0}
app.payment.vnpay.command=${VNPAY_COMMAND:pay}
app.payment.vnpay.order-type=${VNPAY_ORDER_TYPE:other}
app.payment.vnpay.locale=${VNPAY_LOCALE:vn}
app.payment.vnpay.expire-minutes=${VNPAY_EXPIRE_MINUTES:15}
app.payment.vnpay.request-timeout-ms=${VNPAY_REQUEST_TIMEOUT_MS:5000}

# Ebook reader session token HMAC secret. Production should use a dedicated value.
app.ebook.reader.session-secret=${EBOOK_READING_SESSION_SECRET:${JWT_SECRET:}}

# ======================
# CORS CONFIG
# ======================
# Frontend origins duoc phep goi API. Production nen doi thanh domain frontend that.
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# ======================
# COOKIE CONFIG
# ======================
# Config các thuộc tính cho cookie trên browser
app.cookie.refresh-token-name=refreshToken
app.cookie.refresh-token-path=/api/auth/
# Khi deploy production có HTTPS thì nên để secure = true để cookie chỉ được gửi qua HTTPS
app.cookie.refresh-token-secure=false
app.cookie.refresh-token-same-site=Lax

# ======================
# ACTUATOR / MONITORING
# ======================
# Prometheus scrapes this endpoint: /actuator/prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.prometheus.metrics.export.enabled=true

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dwgv3yx7e}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.ebook-folder=${CLOUDINARY_EBOOK_FOLDER:pdf}

# Disabled by default so local development does not call Cloudinary in the background.
app.book-images.cleanup.enabled=${BOOK_IMAGE_CLEANUP_ENABLED:false}
app.book-images.cleanup.fixed-delay-ms=${BOOK_IMAGE_CLEANUP_FIXED_DELAY_MS:3600000}
app.book-images.cleanup.batch-size=${BOOK_IMAGE_CLEANUP_BATCH_SIZE:25}

# Add stable tags to every metric so Grafana can filter this service clearly.
management.metrics.tags.application=${app.service-name}
management.metrics.tags.environment=${APP_ENV:local}
