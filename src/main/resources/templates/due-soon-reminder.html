<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhắc trả sách sắp đến hạn</title>
</head>
<body>
<p>Chào <span th:text="${fullName}">Bạn đọc</span>,</p>

<p>Lượt mượn sau sắp đến hạn trả:</p>

<ul>
    <li><strong>Sách:</strong> <span th:text="${bookTitle}">Tên sách</span></li>
    <li><strong>Barcode:</strong> <span th:text="${barcode}">BARCODE</span></li>
    <li><strong>Hạn trả:</strong> <span th:text="${dueDate}">due date</span></li>
</ul>

<p>Vui lòng trả sách đúng hạn hoặc gia hạn nếu sách còn đủ điều kiện theo chính sách thư viện.</p>
</body>
</html>
