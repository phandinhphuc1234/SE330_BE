# Grafana dashboard provisioning.
#
# Vai trò file này:
# - Chỉ cho Grafana biết phải đọc dashboard JSON từ folder nào.
# - Khi container start, Grafana tự import dashboard trong grafana/dashboards.
# - Không cần import JSON thủ công trong UI.

# Version schema provisioning của Grafana.
apiVersion: 1

providers:
  # Tên provider nội bộ, hiển thị trong phần provisioning/log của Grafana.
  - name: Library Service Dashboards

    # Grafana organization id. Local setup mặc định orgId = 1.
    orgId: 1

    # Folder trong Grafana UI để gom dashboard của project.
    folder: Library Monitoring

    # Provider type=file nghĩa là dashboard được load từ file system.
    type: file

    # false nghĩa là nếu dashboard bị xóa khỏi file, Grafana được phép xóa dashboard provisioned.
    disableDeletion: false

    # Grafana kiểm tra thay đổi file dashboard mỗi 30 giây.
    updateIntervalSeconds: 30

    # Cho phép chỉnh dashboard từ UI. Nếu muốn dashboard chỉ quản lý bằng Git, đổi thành false.
    allowUiUpdates: true

    options:
      # Path bên trong Grafana container.
      # compose.yaml mount ./grafana/dashboards vào /var/lib/grafana/dashboards.
      path: /var/lib/grafana/dashboards
